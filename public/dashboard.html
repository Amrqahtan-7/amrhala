<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>amrhala - Owner Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dashboard-body">
  <div class="page-wrapper">
    <header class="header header-dark">
      <div class="logo">amrhala</div>
      <p class="tagline">Owner Dashboard</p>
    </header>

    <main class="dashboard-main">
      <div class="dashboard-header">
        <h2>All Bookings</h2>
        <div class="dashboard-meta">
          <span id="total-count">Loading...</span>
          <button class="btn-refresh" onclick="loadBookings()">&#8635; Refresh</button>
        </div>
      </div>

      <div id="table-container">
        <table class="bookings-table" id="bookings-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Customer Name</th>
              <th>Phone</th>
              <th>Time Slot</th>
              <th>Submitted At</th>
            </tr>
          </thead>
          <tbody id="bookings-body">
            <tr><td colspan="5" class="loading-row">Loading bookings...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="empty-state hidden" id="empty-state">
        <p>No bookings yet.</p>
      </div>
    </main>

    <footer class="footer">
      <p>Auto-refreshes every 30 seconds &bull; amrhala Restaurant Management</p>
    </footer>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
